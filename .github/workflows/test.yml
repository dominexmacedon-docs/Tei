name: VM Compiler Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Compile project
        run: |
          gcc -std=c11 -Wall -Wextra -I src \
            src/vm/vm.c \
            src/vm/stack.c \
            src/vm/value.c \
            src/vm/chunk.c \
            src/vm/opcode.c \
            src/vm/native.c \
            src/vm/object.c \
            src/compiler/compiler_core.c \
            src/compiler/emit.c \
            tests/test_compiler.c \
            -o test_compiler

      - name: Run compiler tests
        run: |
          ./test_compiler
