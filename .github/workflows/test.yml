name: VM Test Build

on:
  workflow_dispatch:
  push:

jobs:
  build-vm-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Build VM test
        run: |
          gcc tests/test_vm.c \
          src/vm/vm.c \
          src/vm/chunk.c \
          src/vm/stack.c \
          src/vm/value.c \
          src/vm/object.c \
          src/vm/native.c \
          -Iinclude \
          -o test_vm
      - name: Run VM test
        run: |
          ./test_vm
